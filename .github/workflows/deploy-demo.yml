name: Deploy demo to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "config.py"
      - "env_cfg.py"
      - "sesame_robot.py"
      - "play.py"
      - "urdf_model/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # Heavy: pulls mjlab + torch (CPU). mjswan needs them at build
          # time because add_mjlab_scene reads from the live env_cfg.
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch
          pip install mjswan mjlab onnx

      - name: Build demo
        env:
          MJSWAN_BASE_PATH: "/${{ github.event.repository.name }}/"
          MJSWAN_NO_LAUNCH: "1"
        run: python web/main.py --no-launch

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          publish_branch: gh-pages
          force_orphan: true
